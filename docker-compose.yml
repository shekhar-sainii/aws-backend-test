version: '3.8'

services:
  backend:
    image: shekharsaini94/aws-backend-test:latest
    build: .
    container_name: backend-container
    ports:
      - "5000:5000"
    restart: always
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - PORT=5000
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: redis-container
    ports:
      - "6379:6379"
    restart: always
